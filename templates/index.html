<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>消失的恒星</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050c16;
        --panel: rgba(9, 18, 32, 0.92);
        --line: rgba(146, 182, 255, 0.22);
        --text: #eff5ff;
        --muted: #9db0ca;
        --accent: #76a8ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(40, 76, 130, 0.32), transparent 35%),
          radial-gradient(circle at bottom right, rgba(136, 79, 39, 0.25), transparent 28%),
          var(--bg);
      }
      .wrap {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 42px);
        text-align: center;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
        text-align: center;
      }
      .chart {
        width: min(100%, 620px);
        border-radius: 16px;
        display: block;
        border: 1px solid rgba(255, 255, 255, 0.12);
        margin: 18px 0 22px;
        margin-left: auto;
        margin-right: auto;
      }
      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(118, 168, 255, 0.06);
      }
      form {
        text-align: center;
      }
      button, .link-btn {
        margin-top: 18px;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 16px;
        color: white;
        background: linear-gradient(135deg, #5b8fff, #7dc4ff);
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .meta {
        display: flex;
        justify-content: center;
        margin-bottom: 10px;
      }
      .badge {
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--text);
        background: rgba(118, 168, 255, 0.08);
        font-size: 14px;
      }
      .hint-btn {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 14px;
        color: var(--accent);
        background: rgba(118, 168, 255, 0.1);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .hint-btn:hover {
        background: rgba(118, 168, 255, 0.2);
      }
      .tool-row {
        display: flex;
        justify-content: flex-start;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .hint-text {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(118, 168, 255, 0.15);
        color: var(--accent);
        font-weight: 600;
        display: none;
        text-align: left;
      }
      .hint-text.show {
        display: block;
      }
      .difficulty-panel {
        width: min(100%, 420px);
        margin: 0 auto 18px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(118, 168, 255, 0.08);
      }
      .difficulty-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .difficulty-label {
        color: var(--text);
        font-weight: 600;
      }
      .difficulty-input {
        width: 96px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(5, 12, 22, 0.7);
        color: var(--text);
        text-align: center;
        font-size: 15px;
      }
      .difficulty-submit {
        margin-top: 0;
        padding: 10px 16px;
        font-size: 15px;
      }
      .difficulty-help {
        margin: 10px 0 0;
        font-size: 13px;
      }
      .difficulty-error {
        margin: 10px 0 0;
        color: #ff9c9c;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>消失的恒星</h1>
        <p>下图的星座中有颗星星消失了，请根据星座形状找到它。</p>
        <div class="difficulty-panel">
          <form method="post" action="/difficulty">
            <div class="difficulty-row">
              <span class="difficulty-label">极限星等：</span>
              <input
                class="difficulty-input"
                type="number"
                name="difficulty"
                min="0"
                step="0.1"
                value="{{ '%.1f'|format(current_difficulty) }}"
                required
              >
              <button class="difficulty-submit" type="submit">确认</button>
            </div>
            <!-- <p class="difficulty-help">当前出题极限星等：{{ '%.1f'|format(current_difficulty) }}，选项极限星等：{{ '%.1f'|format(option_difficulty) }}</p> -->
            {% if difficulty_error %}
            <p class="difficulty-error">{{ difficulty_error }}</p>
            {% endif %}
          </form>
        </div>
        <div class="tool-row">
          <button type="button" class="hint-btn" onclick="toggleHint()">💡 提示</button>
          <form method="post" action="/toggle-lines">
            <button type="submit" class="hint-btn">
              {% if show_constellation_lines %}隐藏星座连线{% else %}显示星座连线{% endif %}
            </button>
          </form>
        </div>
        <div class="hint-text" id="hintText">当前星座：{{ region_name }}</div>
        <br></br>
        <form method="post" action="/answer">
          <div class="options">
            {% for option in options %}
            <label>
              <input type="radio" name="answer" value="{{ option }}" required>
              <span>{{ option }}</span>
            </label>
            {% endfor %}
          </div>
          <button type="submit">提交答案</button>
        </form>
        <img class="chart" src="data:image/png;base64,{{ chart_data }}" alt="星图">
      </section>
    </main>
    <script>
      function toggleHint() {
        const hintText = document.getElementById('hintText');
        hintText.classList.toggle('show');
      }
    </script>
  </body>
</html>
