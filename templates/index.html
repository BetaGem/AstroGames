<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>找出消失的恒星</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050c16;
        --panel: rgba(9, 18, 32, 0.92);
        --line: rgba(146, 182, 255, 0.22);
        --text: #eff5ff;
        --muted: #9db0ca;
        --accent: #76a8ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(40, 76, 130, 0.32), transparent 35%),
          radial-gradient(circle at bottom right, rgba(136, 79, 39, 0.25), transparent 28%),
          var(--bg);
      }
      .wrap {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 42px);
        text-align: center;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
        text-align: center;
      }
      .chart {
        width: min(100%, 620px);
        border-radius: 16px;
        display: block;
        border: 1px solid rgba(255, 255, 255, 0.12);
        margin: 18px 0 22px;
        margin-left: auto;
        margin-right: auto;
      }
      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(118, 168, 255, 0.06);
      }
      form {
        text-align: center;
      }
      button, .link-btn {
        margin-top: 18px;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 16px;
        color: white;
        background: linear-gradient(135deg, #5b8fff, #7dc4ff);
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .meta {
        display: flex;
        justify-content: center;
        margin-bottom: 10px;
      }
      .badge {
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--text);
        background: rgba(118, 168, 255, 0.08);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>找出消失的恒星</h1>
        <p><strong>【{{ region_name }}】</strong>里有颗星星消失了，请根据星座形状找到它。</p>
        <form method="post" action="/answer">
          <div class="options">
            {% for option in options %}
            <label>
              <input type="radio" name="answer" value="{{ option }}" required>
              <span>{{ option }}</span>
            </label>
            {% endfor %}
          </div>
          <button type="submit">提交答案</button>
        </form>
        <img class="chart" src="data:image/png;base64,{{ chart_data }}" alt="星图">
      </section>
    </main>
  </body>
</html>
