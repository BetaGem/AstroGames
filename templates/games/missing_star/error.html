<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>会话失效</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050c16;
        --panel: rgba(9, 18, 32, 0.92);
        --line: rgba(146, 182, 255, 0.22);
        --text: #eff5ff;
        --muted: #9db0ca;
        --accent: #76a8ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(40, 76, 130, 0.32), transparent 35%),
          radial-gradient(circle at bottom right, rgba(136, 79, 39, 0.25), transparent 28%),
          var(--bg);
      }
      .card {
        width: min(640px, 100%);
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      .actions a {
        padding: 11px 16px;
        border-radius: 999px;
        text-decoration: none;
      }
      .primary {
        color: white;
        background: linear-gradient(135deg, #5b8fff, #7dc4ff);
      }
      .secondary {
        color: var(--muted);
        border: 1px solid var(--line);
        background: rgba(118, 168, 255, 0.08);
      }
      .footer {
        margin-top: 18px;
        font-size: 14px;
      }
      .footer-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(157, 176, 202, 0.56);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .footer-link:hover {
        color: rgba(157, 176, 202, 0.74);
        text-decoration: underline;
      }
      .footer-icon {
        width: 15px;
        height: 15px;
        fill: currentColor;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>会话已失效</h1>
      <p>当前这局《消失的恒星》已经失去上下文了，可以回到游戏重新开始，或者返回主菜单继续探索 AstroGames。</p>
      <div class="actions">
        <a class="primary" href="{{ url_for('missing_star.index', new=1, reset_lines=1) }}">重新开始</a>
        <a class="secondary" href="{{ url_for('home') }}">返回主菜单</a>
      </div>
      <div class="footer">
        <a class="footer-link" href="https://github.com/BetaGem/AstroGames" target="_blank" rel="noreferrer" aria-label="Project source on GitHub">
          <svg class="footer-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.7 7.7 0 0 1 8 4.77c.68 0 1.37.09 2.01.27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
          </svg>
          <span>Source</span>
        </a>
      </div>
    </main>
  </body>
</html>
