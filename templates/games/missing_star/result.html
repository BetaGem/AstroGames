<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>答题结果</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050c16;
        --panel: rgba(9, 18, 32, 0.92);
        --line: rgba(146, 182, 255, 0.22);
        --text: #eff5ff;
        --muted: #9db0ca;
        --ok: #67d9a4;
        --bad: #ff8a8a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(64, 106, 173, 0.24), transparent 35%),
          radial-gradient(circle at bottom, rgba(160, 89, 60, 0.16), transparent 30%),
          var(--bg);
      }
      .wrap {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .brand-kicker {
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .brand-title {
        margin: 0;
        font-size: 20px;
        color: var(--text);
        text-align: left;
      }
      .menu-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(118, 168, 255, 0.08);
        color: var(--muted);
        text-decoration: none;
      }
      .menu-link:hover {
        color: var(--text);
        background: rgba(118, 168, 255, 0.12);
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.6;
        text-align: center;
      }
      .status {
        margin-bottom: 10px;
        font-size: 32px;
        font-weight: 700;
        color: {% if is_correct %}var(--ok){% else %}var(--bad){% endif %};
      }
      .meta-line {
        margin-bottom: 8px;
      }
      .chart-title {
        margin: 28px 0 10px;
        color: var(--text);
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-align: center;
      }
      .chart {
        width: min(100%, 620px);
        border-radius: 16px;
        display: block;
        border: 1px solid rgba(255, 255, 255, 0.12);
        margin: 0 auto 22px;
      }
      .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      .actions a {
        border-radius: 999px;
        padding: 12px 20px;
        font-size: 16px;
        text-decoration: none;
        display: inline-block;
      }
      .primary {
        color: white;
        background: linear-gradient(135deg, #5b8fff, #7dc4ff);
      }
      .secondary {
        color: var(--muted);
        border: 1px solid var(--line);
        background: rgba(118, 168, 255, 0.08);
      }
      .knowledge {
        margin: 14px auto 0;
        width: min(100%, 620px);
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(118, 168, 255, 0.1);
        color: var(--text);
        line-height: 1.7;
        text-align: left;
      }
      .knowledge-source {
        display: inline;
        color: rgba(157, 176, 202, 0.58);
      }
      .footer {
        margin-top: 22px;
        text-align: center;
        font-size: 14px;
      }
      .footer-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(157, 176, 202, 0.56);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .footer-link:hover {
        color: rgba(157, 176, 202, 0.74);
        text-decoration: underline;
      }
      .footer-icon {
        width: 15px;
        height: 15px;
        fill: currentColor;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="topbar">
          <div class="brand">
            <div class="brand-kicker">AstroGames</div>
            <p class="brand-title">消失的恒星</p>
          </div>
          <a class="menu-link" href="{{ url_for('home') }}">返回主菜单</a>
        </div>
        <p class="status">{% if is_correct %}回答正确{% else %}回答错误{% endif %}</p>
        <p class="meta-line">你的选择：{{ selected or "未选择" }}</p>
        <p class="meta-line">正确答案：{{ answer }}</p>
        {% if knowledge_text %}
        <div class="knowledge"><strong>关于这颗星：</strong>{{ knowledge_text }}</div>
        {% endif %}
        <div class="actions">
          <a class="primary" href="{{ url_for('missing_star.index', new=1, reset_lines=1) }}">再来一题</a>
          <a class="secondary" href="{{ url_for('missing_star.index') }}">回到本题</a>
        </div>
        <div class="chart-title">{{ region_name }}</div>
        <img class="chart" src="data:image/png;base64,{{ chart_data }}" alt="星图">
        <div class="footer">
          <a class="footer-link" href="https://github.com/BetaGem/AstroGames" target="_blank" rel="noreferrer" aria-label="Project source on GitHub">
            <svg class="footer-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.7 7.7 0 0 1 8 4.77c.68 0 1.37.09 2.01.27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
            </svg>
            <span>Source</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
